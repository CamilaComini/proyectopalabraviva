<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palabra Viva</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- PANTALLA 1: BIENVENIDA (SPLASH) -->
    <div id="screen-splash" class="screen active">
        <div class="welcome-container">
            <h1 class="main-title">PALABRA VIVA</h1>
            <p class="subtitle">Biblia de Estudio</p>
            <button class="btn-start">COMENZAR</button>
        </div>
    </div>

    <!-- PANTALLA 2: DIVISIÓN PRINCIPAl -->
    <div id="screen-main" class="screen">
        <!-- Contenido del menú principal o accesos del proyecto -->
    </div>

    <!-- PANTALLA 3A: DETALLE DE LA BIBLIA (Tu pantalla anterior mejorada) -->
    <div id="screen-bible-detail" class="screen">
        <!-- Contenido de las tarjetas y abanico -->
    </div>

    <!-- PANTALLA 3B: DETALLE DEL CAMINO PERSONAL -->
    <div id="screen-path-detail" class="screen">
        <div class="app-container path-theme">
            <header class="main-header">
                <p class="header-statement text-italic">Tu encuentro diario</p>
            </header>

            <main class="path-content">
                <div class="path-card">
                    <h3>1. Mi Punto de Partida</h3>
                    <p class="question">¿Cómo está tu corazón hoy?</p>
                    <div class="mood-buttons">
                        <span class="badge" data-mood="optimo">Óptimo</span>
                        <span class="badge active" data-mood="agradecido">Agradecido</span>
                        <span class="badge" data-mood="cansado">Cansado</span>
                        <span class="badge" data-mood="triste">Triste</span>
                    </div>
                    <div id="moodResponse" class="mood-response-container">
                        <p class="mood-text">"Entrad por sus puertas con acción de gracias, por sus atrios con alabanza..."</p>
                        <span class="mood-verse">Salmo 100:4</span>
                    </div>
                <div class="path-card">
                    <h3>2. La Ruta de Emaús</h3>
                    <p class="reflection"><em>"Reconocer Su Presencia..."</em></p>
                </div>
            </main>
        </div>
    </div>

    <script src="ariel.js"></script>
</body>
</html>
